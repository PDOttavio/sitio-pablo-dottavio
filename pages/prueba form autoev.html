<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/estilos.css">
    <title>Document</title>
</head>
<body>
    <section class="auto-evaluacion">
  <h2>Autoevaluación en Psicología del Deporte</h2>
  <p>Puntua las siguientes variables, siendo el menor puntaje cero, y el mayor diez</p>
  <form action="#" method="POST" class="evaluacion-form">
    
    <!-- Motivación -->
    <div class="form-item">
      <label for="motivacion">Motivación</label>
      <input type="number" id="motivacion" name="motivacion" min="1" max="10" required />
    </div>

    <!-- Autoconfianza -->
    <div class="form-item">
      <label for="autoconfianza">Autoconfianza</label>
      <input type="number" id="autoconfianza" name="autoconfianza" min="1" max="10" required />
    </div>

    <!-- Concentración -->
    <div class="form-item">
      <label for="concentracion">Concentración</label>
      <input type="number" id="concentracion" name="concentracion" min="1" max="10" required />
    </div>

    <!-- Gestión de pensamientos -->
    <div class="form-item">
      <label for="pensamientos">Gestión de pensamientos</label>
      <input type="number" id="pensamientos" name="pensamientos" min="1" max="10" required />
    </div>

    <!-- Gestión del estrés, miedos y presiones -->
    <div class="form-item">
      <label for="estres">Gestión del estrés, miedos y presiones</label>
      <input type="number" id="estres" name="estres" min="1" max="10" required />
    </div>

    <!-- Liderazgo -->
    <div class="form-item">
      <label for="liderazgo">Liderazgo</label>
      <input type="number" id="liderazgo" name="liderazgo" min="1" max="10" required />
    </div>

    <!-- Comunicación -->
    <div class="form-item">
      <label for="comunicacion">Comunicación</label>
      <input type="number" id="comunicacion" name="comunicacion" min="1" max="10" required />
    </div>

    <button type="submit">Enviar Evaluación</button>
  </form>
</section>

</body>
</html>
